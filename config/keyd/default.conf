# forkOS — keyd config
# Installer : sudo cp ~/project/forkos/config/keyd/default.conf /etc/keyd/default.conf
#             sudo systemctl enable --now keyd
#
# Comportement Super (touche Windows) :
#   Tap seul   → envoie F20 → niri lance la palette
#   Tenu + H/L → envoie Meta+H/L → raccourcis Mod+X normaux

[ids]
*

[main]
leftmeta = overload(super_mod, f20)
rightmeta = overload(super_mod, f20)

# Quand Super est tenu, toutes les touches reçoivent le modificateur Meta
[super_mod:M]
